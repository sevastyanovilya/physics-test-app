name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || true

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.jks

      - name: Build release APK (with keystore)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/app/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Build debug APK (no keystore)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Collect APK files
        run: |
          mkdir -p output_apk
          find app/build/outputs/apk -name "*.apk" -exec cp {} output_apk/ \;
          ls -lh output_apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhysicsTest-APK
          path: output_apk/*.apk
          retention-days: 90
