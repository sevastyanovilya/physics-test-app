name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || true

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Collect APK
        run: |
          mkdir -p output_apk
          find app/build/outputs/apk -name "*.apk" -exec cp {} output_apk/ \;
          ls -lh output_apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhysicsTest-APK
          path: output_apk/*.apk
          retention-days: 90
